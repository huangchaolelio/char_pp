# 教练定义：从 COS 路径中识别教练
coaches:
  - name: "孙浩泓"
    cos_prefix_keywords: ["孙浩泓"]

# 分类规则（优先级从高到低，首个命中规则生效）
# 字段说明：
#   require_keywords: 文件名必须全部包含（AND）
#   match_keywords:   文件名至少包含一个（OR），为空则只要 require 满足即命中
#   exclude_keywords: 文件名不能包含任何一个（优先于其他规则）
#   confidence:       命中时的置信度（默认 1.0；大类兜底时用 0.7）
