openapi: 3.0.3
info:
  title: Feature-019 · KB Version Detail
  version: "1.0.0"
  description: |
    按复合主键 `(tech_category, version)` 获取 KB 记录详情，
    包含 expert_tech_points 摘要（维度数、冲突数）。

paths:
  /api/v1/knowledge-base/versions/{tech_category}/{version}:
    get:
      summary: KB 版本详情
      operationId: get_kb_version_detail
      parameters:
        - in: path
          name: tech_category
          required: true
          schema:
            type: string
          description: "21 类技术枚举值之一"
        - in: path
          name: version
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelopeKbDetail' }
              example:
                success: true
                data:
                  tech_category: forehand_attack
                  version: 3
                  status: active
                  point_count: 12
                  extraction_job_id: 8f4c8a3b-9a0e-4aef-9a3b-1a2d6c9e7f00
                  approved_by: coach_zhang
                  approved_at: "2026-04-30T15:13:34+08:00"
                  created_at: "2026-04-30T14:59:01+08:00"
                  notes: "正手攻球首版审核通过"
                  dimensions_summary:
                    total_points: 12
                    dimensions: [elbow_angle_at_contact, swing_trajectory, contact_timing, weight_transfer]
                    conflict_count: 0
                meta: null
        '404':
          description: 记录不存在
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
              example:
                success: false
                error:
                  code: KB_VERSION_NOT_FOUND
                  message: "KB 版本不存在"
                  details:
                    tech_category: forehand_attack
                    version: 999
        '500':
          description: 未预期异常
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
              example:
                success: false
                error: { code: INTERNAL_ERROR, message: "内部服务器错误", details: null }

components:
  schemas:
    DimensionsSummary:
      type: object
      required: [total_points, dimensions, conflict_count]
      properties:
        total_points: { type: integer, minimum: 0 }
        dimensions:
          type: array
          items: { type: string }
        conflict_count: { type: integer, minimum: 0 }

    KbVersionDetail:
      allOf:
        - $ref: './kb-versions-list.yaml#/components/schemas/KbVersionItem'
        - type: object
          required: [dimensions_summary]
          properties:
            dimensions_summary: { $ref: '#/components/schemas/DimensionsSummary' }

    SuccessEnvelopeKbDetail:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, enum: [true] }
        data: { $ref: '#/components/schemas/KbVersionDetail' }
        meta: { type: object, nullable: true }

    ErrorEnvelope:
      type: object
      required: [success, error]
      properties:
        success: { type: boolean, enum: [false] }
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object, additionalProperties: true, nullable: true }
